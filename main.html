 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery List</title>
</head>
<body>
    <table id="groceryTable">
        <tr>
            <th>Item</th>
            <th>Price</th>
        </tr>
        <tr>
            <td class="item">Apple</td>
            <td class="prices">50</td>
        </tr>
        <tr>
            <td class="item">Banana</td>
            <td class="prices">30</td>
        </tr>
        <tr>
            <td class="item">Milk</td>
            <td class="prices">40</td>
        </tr>
    </table>
    <script>
		 let prices = document.querySelectorAll(".prices");
let total = 0;

prices.forEach((price) => {
    total += Number(price.textContent);
});

let table = document.getElementById("groceryTable");

let newRow = document.createElement("tr");

// first cell (label)
let cell1 = document.createElement("td");
cell1.textContent = "Total";

// second cell (value)
let cell2 = document.createElement("td");
cell2.textContent = total;

newRow.appendChild(cell1);
newRow.appendChild(cell2);

table.appendChild(newRow);
	</script>



</body>
</html>
