 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery List</title>
</head>
<body>
    <table id="groceryTable">
        <tr>
            <th>Item</th>
            <th>Price</th>
        </tr>
        <tr>
            <td class="item">Apple</td>
            <td class="prices">50</td>
        </tr>
        <tr>
            <td class="item">Banana</td>
            <td class="prices">30</td>
        </tr>
        <tr>
            <td class="item">Milk</td>
            <td class="prices">40</td>
        </tr>
    </table>
  <script>
  const prices = document.querySelectorAll(".prices");
  let total = 0;

  prices.forEach((price) => {
    total += Number(price.textContent);
  });

  const table = document.getElementById("groceryTable");
  const newRow = document.createElement("tr");
  const totalCell = document.createElement("td");

  totalCell.textContent = total;
  totalCell.colSpan = 2; // optional, makes it span both columns

  newRow.appendChild(totalCell);
  table.appendChild(newRow);
</script>



</body>
</html>
