 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery List</title>
</head>
<body>
    <table id="groceryTable">
        <tr>
            <th>Item</th>
            <th>Price</th>
        </tr>
        <tr>
            <td class="item">Apple</td>
            <td class="prices">50</td>
        </tr>
        <tr>
            <td class="item">Banana</td>
            <td class="prices">30</td>
        </tr>
        <tr>
            <td class="item">Milk</td>
            <td class="prices">40</td>
        </tr>
    </table>
 <script>
  const prices = document.querySelectorAll(".prices");
  let total = 0;

  prices.forEach((price) => {
    total += Number(price.textContent);
  });

  const tbody = document.querySelector("#groceryTable tbody");
  const newRow = document.createElement("tr");
  const newCell = document.createElement("td");

  newCell.textContent = total;
  newCell.colSpan = 2;

  newRow.appendChild(newCell);
  tbody.appendChild(newRow);
</script>


</body>
</html>
