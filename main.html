  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grocery List</title>
</head>
<body>
  <table id="groceryTable">
    <tr>
      <th>Item</th>
      <th>Price</th>
    </tr>
    <tr>
      <td class="item">Apple</td>
      <td class="prices">50</td>
    </tr>
    <tr>
      <td class="item">Banana</td>
      <td class="prices">30</td>
    </tr>
    <tr>
      <td class="item">Milk</td>
      <td class="prices">40</td>
    </tr>
  </table>

 <button>Calculate Total</button>
<h3 id="ans"></h3>

<script>
  const priceCells = document.querySelectorAll(".prices");
  const button = document.querySelector("button");
  const ans = document.getElementById("ans");

  const originalPrices = Array.from(priceCells).map((cell) =>
    cell.textContent.trim()
  );

  button.addEventListener("click", function () {
    let total = 0;

    priceCells.forEach((cell, index) => {
      const currentText = cell.textContent.trim();
      const originalText = originalPrices[index];

      let value;

      if (currentText.startsWith(originalText) && currentText !== originalText) {
        value = Number(currentText.slice(originalText.length));
      } else {
        value = Number(currentText);
      }

      total += value;
    });

    ans.textContent = total;
  });
</script>

</body>
</html>
